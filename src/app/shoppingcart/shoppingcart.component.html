<h2>Shopping Cart</h2>
<table mat-table [dataSource]="shoppingCart" class="mat-elevation-z20">

  <ng-container matColumnDef="item">
    <th mat-header-cell *matHeaderCellDef [ngClass]="'customWidthClass'"> Item </th>
    <td mat-cell *matCellDef="let element" [ngClass]="'customWidthClass'"> {{element.name}} </td>
    <td mat-footer-cell *matFooterCellDef> Total </td>
  </ng-container>

  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef [ngClass]="'customWidthClass'"> Quantity </th>
    <td mat-cell *matCellDef="let element" [ngClass]="'customWidthClass'"> {{element.quantity}} </td>
    <td mat-footer-cell *matFooterCellDef>{{ totalItems }}</td>
  </ng-container>

  <ng-container matColumnDef="unitprice">
    <th mat-header-cell *matHeaderCellDef [ngClass]="'customWidthClass'"> Unit Price </th>
    <td mat-cell *matCellDef="let element" [ngClass]="'customWidthClass'"> {{element.unit_price}} </td>
    <td mat-footer-cell *matFooterCellDef></td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef [ngClass]="'customWidthClass'"> Price </th>
    <td mat-cell *matCellDef="let element" [ngClass]="'customWidthClass'"> {{element.price}} </td>
    <td mat-footer-cell *matFooterCellDef> {{totalCost}} </td>
  </ng-container>

  <ng-container matColumnDef="add">
    <th mat-header-cell *matHeaderCellDef>
      <mat-icon>add_shopping_cart</mat-icon>
    </th>
    <td mat-cell *matCellDef="let element">
      <button class="btn btn-primary" (click)="addToOrder(element.item_key)" mat-button>
        <mat-icon>add_shopping_cart</mat-icon>
      </button>
    </td>
    <td mat-footer-cell *matFooterCellDef></td>
  </ng-container>

  <ng-container matColumnDef="remove">
    <th mat-header-cell *matHeaderCellDef>
      <mat-icon>remove_shopping_cart</mat-icon>
    </th>
    <td mat-cell *matCellDef="let element">
      <button class="btn btn-secondary" (click)="removeOrder(element.item_key)" mat-button>
        <mat-icon>remove_shopping_cart</mat-icon>
      </button>
    </td>
    <td mat-footer-cell *matFooterCellDef></td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  <tr mat-footer-row class="mat-footer-row" *matFooterRowDef="displayedColumns"></tr>
</table>
<mat-divider></mat-divider>
<div>
  <div class="btn btn-secondary" style="float:right; width:50%;">
    <button (click)="checkoutCart('CLEAR')"  mat-button><mat-icon>clear_all</mat-icon></button>
  </div>
  <mat-divider vertical=true></mat-divider>
  <div class="btn btn-primary" style="float:right; width:50%;">
      <button mat-button (click)="checkoutCart('ORDER_CONFIRMED')"><mat-icon>check_circle_outline</mat-icon></button>
    </div>
</div>
