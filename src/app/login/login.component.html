<section class="container">
    <div class="col-sm-6">
        <form style="width:22rem" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <p class="h5 text-center mb-4">Sign in</p>

            <div class="form-group">
                <mat-form-field>
                    <input matInput placeholder="Enter your name" [formControl]="userName" required>
                    <mat-error *ngIf="userName.invalid">{{getUserNameErrorMessage()}}</mat-error>
                </mat-form-field>
            </div>
            <div class="form-group">
                <mat-form-field>
                    <input matInput placeholder="Enter your password" [formControl]="password" required>
                    <mat-error *ngIf="password.invalid">{{getPasswordErrorMessage()}}</mat-error>
                </mat-form-field>
            </div>
            <div style="width:100%;">
                <div style="width:50%;float:left;">
                    <button class="btn btn-primary waves-light" mat-raised-button>Login</button>
                </div>
                <div style="width:50%;float:left;">
                    <button class="btn btn-primary" mat-raised-button>Forgot Password</button>
                </div>
            </div>
        </form>
    </div>
</section>
